<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:13px;background:#F4F4F4}
.db{display:flex;min-height:100vh}
.sb{width:210px;flex-shrink:0;background:#003C71;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sbl{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.scr{font-size:9px;color:rgba(255,255,255,.35);margin-top:6px;letter-spacing:.08em;text-transform:uppercase;text-align:center}
.nsec{padding:13px 13px 4px;font-size:9px;font-weight:700;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.1em}
.nb{display:flex;align-items:center;gap:8px;padding:7px 11px;margin:1px 6px;border-radius:5px;cursor:pointer;color:rgba(255,255,255,.6);font-size:12px;border:none;background:none;width:calc(100% - 12px);text-align:left;font-family:inherit;transition:background .12s,color .12s}
.nb:hover{background:rgba(255,255,255,.08);color:#fff}
.nb.on{background:#F26522;color:#fff;font-weight:600}
.nb.on .nc{background:rgba(255,255,255,.25);color:#fff}
.nbi{font-size:14px;flex-shrink:0}
.nbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nc{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-size:10px;padding:1px 6px;border-radius:20px;flex-shrink:0}
.sbf{margin-top:auto;padding:12px 14px;border-top:1px solid rgba(255,255,255,.07);font-size:10px;color:rgba(255,255,255,.28);line-height:1.6}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:3px solid #F26522;padding:11px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.tbt{font-size:15px;font-weight:700;color:#003C71}
.tbs{font-size:11px;color:#58585A;margin-top:2px}
.con{flex:1;padding:16px 18px;display:flex;flex-direction:column;gap:14px}

/* KPI Cards */
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.kp{background:#fff;border-radius:8px;border-top:3px solid #D0D0D0;padding:14px 14px 12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kp.ko{border-top-color:#F26522}.kp.kn{border-top-color:#003C71}
.kp.kgg{border-top-color:#27AE60}.kp.krr{border-top-color:#C0392B}.kp.kbl{border-top-color:#2980B9}
.kic{font-size:20px;color:#D0D0D0;margin-bottom:7px}
.kp.ko .kic{color:#F26522}.kp.kn .kic{color:#003C71}.kp.kgg .kic{color:#27AE60}.kp.krr .kic{color:#C0392B}.kp.kbl .kic{color:#2980B9}
.kv{font-size:26px;font-weight:700;color:#003C71;line-height:1}
.kla{font-size:11px;color:#58585A;margin-top:4px}
.ksb{font-size:10px;color:#B0B0B0;margin-top:2px}

/* Cards */
.card{background:#fff;border-radius:8px;border:1px solid #EBEBEB;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ch{display:flex;align-items:center;gap:7px;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid #F4F4F4}
.ctit{font-size:11px;font-weight:700;color:#003C71;text-transform:uppercase;letter-spacing:.05em}
.cic{font-size:15px;color:#F26522}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* Badges */
.ba{display:inline-block;font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.bpot{background:#FEF0E8;color:#B84C18}
.bseg{background:#D6EAF8;color:#1A5276}
.busr{background:#D4EFDF;color:#1A6B33}
.bsin{background:#F2F3F4;color:#58585A}
.bcat{background:#EEF0FF;color:#3D35A0}

/* Tooltip elegante */
.tip-wrap{position:relative;display:inline-flex;align-items:center;}
.tip-icon{font-size:12px;color:#C8C8C8;cursor:default;margin-left:6px;line-height:1;transition:color .15s;}
.tip-icon:hover{color:#F26522;}
.tip-box{
  opacity:0;visibility:hidden;
  position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(4px);
  background:linear-gradient(135deg,#003C71 0%,#00529A 100%);
  color:#fff;font-size:10.5px;line-height:1.6;padding:10px 14px;
  border-radius:8px;white-space:normal;z-index:200;pointer-events:none;
  min-width:240px;text-align:left;
  box-shadow:0 8px 24px rgba(0,60,113,.25),0 2px 6px rgba(0,0,0,.12);
  border:1px solid rgba(255,255,255,.1);
  transition:opacity .2s ease,transform .2s ease,visibility .2s;
}
.tip-box::before{
  content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  width:12px;height:6px;
  background:linear-gradient(135deg,#003C71 0%,#00529A 100%);
  clip-path:polygon(0 0,100% 0,50% 100%);
}
.tip-wrap:hover .tip-box{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}

/* Funnel */
.funnel-wrap{display:flex;flex-direction:column;gap:8px;padding:4px 0}
.funnel-row{display:flex;align-items:center;gap:10px}
.funnel-lbl{font-size:11px;color:#58585A;width:190px;flex-shrink:0}
.funnel-bar{height:28px;border-radius:4px;display:flex;align-items:center;padding:0 10px;min-width:30px;transition:width .5s}
.funnel-val{font-size:12px;font-weight:700}
.funnel-pct{font-size:11px;color:#888;min-width:32px;text-align:right}

.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{font-size:10px;font-weight:700;color:#58585A;padding:5px 8px;border-bottom:2px solid #F4F4F4;white-space:nowrap;text-align:left;text-transform:uppercase;letter-spacing:.04em;background:#fff;position:sticky;top:0}
.tbl td{padding:6px 8px;border-bottom:1px solid #F4F4F4;color:#003C71;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#FEF0E8}
.tsc{overflow-y:auto;border:1px solid #F0F0F0;border-radius:6px;max-height:340px}
.tsc::-webkit-scrollbar{width:4px}
.tsc::-webkit-scrollbar-thumb{background:#D0D0D0;border-radius:3px}

/* Progress bar */
.pb{height:6px;background:#F0F0F0;border-radius:3px;overflow:hidden;margin-top:3px}
.pbf{height:100%;border-radius:3px}

/* Timeline */
.tl-item{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.tl-text{font-size:12px;color:#58585A;line-height:1.5}
.tl-text strong{color:#003C71;font-weight:600}

/* Gauge */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0}
.gauge-val{font-size:32px;font-weight:700;color:#003C71;line-height:1}
.gauge-sub{font-size:11px;color:#58585A;margin-top:2px;text-align:center}

/* Stat row */
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F4F4F4}
.stat-row:last-child{border-bottom:none}
.stat-lbl{font-size:12px;color:#58585A}
.stat-val{font-size:13px;font-weight:700;color:#003C71}

/* Filter buttons */
.fbtn{padding:4px 12px;border-radius:20px;border:1.5px solid #D0D0D0;background:#fff;font-size:11px;color:#58585A;cursor:pointer;font-family:inherit;transition:all .15s}

.frow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}

/* Opportunity cards */
.opp-card{border-radius:8px;padding:12px;border:1px solid #EBEBEB}

/* Section label */
.slabel{font-size:10px;font-weight:700;color:#003C71;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

/* Donut chart container */
.donut-container{position:relative;width:100%;max-width:220px;margin:0 auto}
.chart-wrap{position:relative;width:100%}
</style>
</head>

function setV(id, btn) {

function render(view) {

// ── RESUMEN ───────────────────────────────────────────────────
function viewResumen() {
  var donut = (function(){
    var stages = [
      {label:"Potencial",        count:10, pct:24, color:"#F26522", bg:"rgba(242,101,34,.13)", border:"#F26522"},
      {label:"En seguimiento",   count:12, pct:28, color:"#2980B9", bg:"rgba(41,128,185,.13)", border:"#2980B9"},
      {label:"Cliente creado DL",count:21, pct:55, color:"#27AE60", bg:"rgba(39,174,96,.16)",  border:"#27AE60"}
    ];
    var W = 260, rowH = 56, gap = 4;
    var fullH = stages.length * rowH + (stages.length - 1) * gap + 36;
    // maxCount dinámico — siempre el mayor de las etapas
    var maxCount = Math.max.apply(null, stages.map(function(s){ return s.count; }));
    var MIN_R = 0.30, MAX_R = 0.96; // clamp para que nunca salga del viewBox
    function stageRatio(count){
      return Math.min(MAX_R, MIN_R + (MAX_R - MIN_R) * (count / maxCount));
    }
    var svgRows = stages.map(function(s, i){
      var ratio    = stageRatio(s.count);
      var topRatio = i === 0 ? MIN_R : stageRatio(stages[i-1].count);
      var w  = Math.round(W * ratio);    var x  = Math.round((W - w) / 2);
      var tw = Math.round(W * topRatio); var tx = Math.round((W - tw) / 2);
      var y  = i * (rowH + gap);
      var pts = tx+','+y+' '+(tx+tw)+','+y+' '+(x+w)+','+(y+rowH)+' '+x+','+(y+rowH);
      return '<g>'
        + '<polygon points="'+pts+'" fill="'+s.bg+'" stroke="'+s.border+'" stroke-width="1.5"/>'
        + '<text x="'+(W/2)+'" y="'+(y+rowH/2-7)+'" text-anchor="middle" font-size="12" font-weight="700" fill="'+s.color+'" font-family="Segoe UI,Arial,sans-serif">'+s.label+'</text>'
        + '<text x="'+(W/2)+'" y="'+(y+rowH/2+9)+'" text-anchor="middle" font-size="11" fill="'+s.color+'" font-family="Segoe UI,Arial,sans-serif">'+s.count+' empresas &bull; '+s.pct+'%</text>'
        + '</g>';
    }).join('');
    // bottom cap triangle — usa lastRatio clamped
    var lastRatio = stageRatio(stages[stages.length-1].count);
    var lw = Math.round(W * lastRatio);
    var lx = Math.round((W - lw) / 2);
    var ly = stages.length * (rowH + gap) - gap;
    var capPts = lx+','+ly+' '+(lx+lw)+','+ly+' '+(W/2)+','+(ly+20);
    var capSvg = '<polygon points="'+capPts+'" fill="rgba(39,174,96,.2)" stroke="#27AE60" stroke-width="1.5"/>';
    var svg = '<svg viewBox="0 0 '+W+' '+(fullH)+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;">'
      + svgRows + capSvg + '</svg>';
    return '<div class="card">'
      + '<div class="ch"><i class="ti ti-filter cic"></i><span class="ctit">Distribucion por etapa</span></div>'
      + svg
      + '</div>';
  })();

  var roadmap = '<div class="card"><div class="ch"><i class="ti ti-chart-bar cic"></i><span class="ctit">Activaciones por mes &mdash; Cliente creado DL (mar&ndash;dic 2026)</span></div><div style="position:relative;height:220px;"><canvas id="c-roadmap" role="img" aria-label="Activaciones por mes de cliente creado DL"></canvas></div><div style="margin-top:10px;padding-top:8px;border-top:1px solid #F4F4F4;font-size:10px;color:#888;">Acumulado al mes actual: <strong style="color:#003C71;">21 empresas activas</strong>. Los meses sin activaciones aparecen en 0.</div></div>';

// ── EMPRESAS ──────────────────────────────────────────────────
function viewEmpresas(filter) {
  var list = filter === "all" ? empresas.slice() : empresas.filter(function(e){ return e.etapa === filter; });

  var meses = {jan:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
  function parseF(f){
    if(!f) return new Date(0);
    var p = f.toLowerCase().split(" ");
    return new Date(parseInt(p[2]), meses[p[1]]!==undefined?meses[p[1]]:0, parseInt(p[0]));
  }
  function catNum(c){
    if(!c || c.indexOf("SIN") >= 0) return 9999;
    var m = c.match(/\d+/);
    return m ? parseInt(m[0]) : 9999;
  }

  if(filter === "creado") {
    list.sort(function(a,b){ return parseF(b.fecha) - parseF(a.fecha); });
  } else {
    list.sort(function(a,b){ return catNum(a.cat) - catNum(b.cat); });
  }
  return `
  <div class="card">
    <div class="ch"><i class="ti ti-building-store cic"></i><span class="ctit">Listado de empresas</span><span style="margin-left:auto;font-size:11px;color:#888;">${list.length} de ${empresas.length}</span></div>
    <div class="frow" id="emp-filters">
      <button class="fbtn ${filter==='all'?'on':''}" onclick="filterEmp('all',this)">Todas (${empresas.length})</button>
      <button class="fbtn ${filter==='potencial'?'on':''}" onclick="filterEmp('potencial',this)">Potencial (10)</button>
      <button class="fbtn ${filter==='seguimiento'?'on':''}" onclick="filterEmp('seguimiento',this)">Seguimiento (12)</button>
      <button class="fbtn ${filter==='creado'?'on':''}" onclick="filterEmp('creado',this)">Cliente creado DL (21)</button>
    </div>
    <div class="tsc">
      <table class="tbl">
        <thead><tr>
          <th>Empresa</th>
          <th>Departamento</th>
          <th>Categoría</th>
          <th>Etapa</th>
          <th>Acceso DL</th>
        </tr></thead>
        <tbody>
          ${list.map(function(e){ return `
          <tr>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${e.nombre}">${e.nombre}</td>
            <td style="white-space:nowrap;"><span style="font-size:10px;color:#58585A;">${e.depto||'—'}</span></td>
            <td><span class="ba bcat">${e.cat.replace("CATEGORIA","Cat.")}</span></td>
            <td><span class="ba ${ETAPA_CLASS[e.etapa]||'bsin'}">${ETAPA_LABEL[e.etapa]||e.etapa||'—'}</span></td>
            <td>${e.fecha ? '<span style="font-size:10px;color:#27AE60;font-weight:600;">✓ '+e.fecha+'</span>' : (e.etapa==='creado'?'<span style="font-size:10px;color:#F26522;font-weight:600;">✓ activo</span>':'<span style="font-size:10px;color:#B0B0B0;">—</span>')}</td>
          </tr>`; }).join("")}
        </tbody>
      </table>
    </div>
  </div>`;
}

function topCats() {
  var map = {};
  empresas.forEach(function(e){ map[e.cat]=(map[e.cat]||0)+1; });
  return Object.keys(map).map(function(k){return{label:k.replace("CATEGORIA","Cat."),count:map[k]};})
    .sort(function(a,b){return b.count-a.count;}).slice(0,6);
}
